<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPA Calculator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">GPA Calculator</h2>

        <!-- Student Info -->
        <input type="text" id="studentName" class="form-control mb-2" placeholder="Student Name">
        <input type="text" id="semester" class="form-control mb-3" placeholder="Semester">

        <!-- Table -->
        <table class="table" id="courseTable">
            <thead>
                <tr>
                    <th>Course</th>
                    <th>Credits</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" class="form-control course-name"></td>
                    <td><input type="number" class="form-control credit"></td>
                    <td>
                        <select class="form-control grade">
                            <option value="4">A</option>
                            <option value="3">B</option>
                            <option value="2">C</option>
                            <option value="1">D</option>
                            <option value="0">F</option>
                        </select>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Buttons -->
        <button id="addRow" class="btn btn-secondary mb-2">Add Course</button>
        <button id="calculate" class="btn btn-primary mb-2">Calculate GPA</button>
        <a href="export.php" class="btn btn-success mb-2">Download CSV</a>

        <!-- Result -->
        <h4 id="result"></h4>

        <!-- Progress Bar -->
        <div class="mt-3">
            <div class="progress">
                <div id="gpaBar" class="progress-bar" style="width:0%">0.00</div>
            </div>
        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
